<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neeha Store</title>

<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#6b2d2d;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.header-right{
display:flex;
gap:10px;
}

.search-box{
padding:6px;
border-radius:5px;
border:none;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:center;
}

.product img{
width:100%;
border-radius:10px;
}

button{
background:#6b2d2d;
color:white;
border:none;
padding:8px;
border-radius:5px;
cursor:pointer;
}

.cart{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:white;
padding:20px;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
overflow-y:auto;
transition:0.3s;
}

.cart.open{
right:0;
}

input{
width:100%;
padding:8px;
margin:5px 0;
}

.closeBtn{
background:red;
margin-bottom:10px;
}

.sort{
margin-left:10px;
padding:5px;
}

</style>

</head>

<body>

<header>

<h2>Neeha Store</h2>

<input class="search-box" type="text" placeholder="Search product" onkeyup="searchProduct(this.value)">

<select class="sort" onchange="sortProducts(this.value)">
<option value="">Sort By</option>
<option value="low">Price Low → High</option>
<option value="high">Price High → Low</option>
</select>

<div class="header-right">

<a href="account.html">
<button>Account</button>
</a>

<button onclick="toggleCart()">
Cart (<span id="cart-count">0</span>)
</button>

</div>

</header>

<div class="products" id="product-list"></div>

<div class="cart" id="cart">

<button class="closeBtn" onclick="toggleCart()">Close</button>

<h3>Your Cart</h3>

<div id="cart-items"></div>

<h4 id="total"></h4>

<h3>Customer Details</h3>

<input type="text" id="custName" placeholder="Full Name">
<input type="text" id="custPhone" placeholder="Phone Number">
<input type="email" id="custEmail" placeholder="Email">
<input type="text" id="custAddress" placeholder="Address">
<input type="text" id="custCity" placeholder="City">
<input type="text" id="custState" placeholder="State">
<input type="text" id="custPincode" placeholder="Pincode">

<button onclick="checkout()">Proceed to Payment</button>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let filteredProducts=[...products];
let cart=[];

function displayProducts(){

let container=document.getElementById("product-list");
container.innerHTML="";

if(filteredProducts.length===0){
container.innerHTML="<p>No products found</p>";
return;
}

filteredProducts.forEach((p,i)=>{

container.innerHTML+=`
<div class="product">

<img src="${p.image}">

<h4>${p.name}</h4>

<p>₹${p.price}</p>

<button onclick="addToCart(${i})">Add to Cart</button>

</div>
`;

});

}

function searchProduct(text){

filteredProducts = products.filter(p =>
p.name.toLowerCase().includes(text.toLowerCase())
);

displayProducts();

}

function sortProducts(type){

if(type==="low"){
filteredProducts.sort((a,b)=>a.price-b.price);
}

if(type==="high"){
filteredProducts.sort((a,b)=>b.price-a.price);
}

displayProducts();

}

function addToCart(index){

cart.push(filteredProducts[index]);

updateCart();

toggleCart();

alert("Item added to cart");

}

function updateCart(){

let cartItems=document.getElementById("cart-items");
let total=0;

cartItems.innerHTML="";

cart.forEach((item,i)=>{

total+=item.price;

cartItems.innerHTML+=`
<div>
${item.name} - ₹${item.price}
</div>
`;

});

document.getElementById("cart-count").innerText=cart.length;
document.getElementById("total").innerText="Total: ₹"+total;

}

function toggleCart(){

document.getElementById("cart").classList.toggle("open");

}

async function checkout(){
let loggedIn = localStorage.getItem("userLoggedIn");

if(!loggedIn){

alert("Please login before placing order");

window.location.href="account.html";

return;

}

if(cart.length===0){
alert("Cart is empty");
return;
}

let name=document.getElementById("custName").value;
let phone=document.getElementById("custPhone").value;
let email=document.getElementById("custEmail").value;
let address=document.getElementById("custAddress").value;
let city=document.getElementById("custCity").value;
let state=document.getElementById("custState").value;
let pincode=document.getElementById("custPincode").value;

if(!name || !phone || !email || !address || !city || !state || !pincode){
alert("Please fill all details");
return;
}

let totalAmount = cart.reduce((sum,item)=>sum+item.price,0);

try{

const response=await fetch("/api/create-order",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
orderAmount:totalAmount,
customerName:name,
customerPhone:phone,
customerEmail:email
})

});

const data=await response.json();

if(data.payment_session_id){

let orders = JSON.parse(localStorage.getItem("orders")) || [];

orders.push({
name:name,
phone:phone,
email:email,
amount:totalAmount,
date:new Date().toLocaleString(),
items:cart
});

localStorage.setItem("orders",JSON.stringify(orders));

const cashfree = Cashfree({ mode: "production" });

cashfree.checkout({
paymentSessionId:data.payment_session_id,
redirectTarget:"_self"
});

}else{
alert("Payment failed");
}

}catch(error){

alert("Something went wrong");

}

}

displayProducts();

</script>

</body>
</html>
