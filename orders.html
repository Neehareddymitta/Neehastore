<!DOCTYPE html>
<html>
<head>
<title>My Orders - Neeha Store</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:30px;
}

.order{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
}

</style>

</head>

<body>

<h2>My Orders</h2>

<div id="orders"></div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let container=document.getElementById("orders");

if(orders.length===0){

container.innerHTML="<p>No orders yet</p>";

}

orders.forEach(order=>{

container.innerHTML+=`

<div class="order">

<h3>Order - ₹${order.amount}</h3>

<p><b>Date:</b> ${order.date}</p>

<p><b>Name:</b> ${order.name}</p>

<p><b>Address:</b> ${order.address}, ${order.city}</p>

<p><b>Phone:</b> ${order.phone}</p>

</div>

`;

});

</script>

</body>

</html>
